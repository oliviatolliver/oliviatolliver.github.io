{% if site.password_protected %}
<div id="password-gate" style="
    position: fixed;
    inset: 0;
    background-color: var(--color-greige);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
">

    <h2 style="color: var(--color-linen); margin-bottom: 20px;">Olivia Tolliver</h2>
    <input
        id="password-input"
        type="password"
        placeholder="Enter Password"
        style="
            padding: 10px;
            font-family: 'Poppins', sans-serif;
            border: 1px solid var(--color-muted);
            background: transparent;
            color: var(--color-linen);
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        "
    >
    <p id="password-error" style="color: red; display: none;">Incorrect password</p>
    <button
        onclick="checkPassword()"
        style="
            padding: 8px 25px;
            background-color: var(--color-linen);
            color: var(--color-dark);
            border: none;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 10px;
        "
    >Enter</button>
</div>

<script>
    // Allow pressing Enter key to submit
    document.getElementById('password-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
        const input = document.getElementById('password-input').value;
        const error = document.getElementById('password-error');
        
        if (input === '!C0rne11Engineer27') {   // change this to your password
            document.getElementById('password-gate').style.display = 'none';
            sessionStorage.setItem('unlocked', 'true');
        } else {
            error.style.display = 'block';
        }
    }

    // If already unlocked this session, skip the gate
    if (sessionStorage.getItem('unlocked') === 'true') {
        document.getElementById('password-gate').style.display = 'none';
    }
</script>
{% endif %}
