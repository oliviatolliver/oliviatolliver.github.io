# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Olivia Tolliver's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Olivia Tolliver
headline: Mechanical Engineering Student at Cornell | Robotics, Prototyping, and Product Design Enthusiast
description: >- # dont remove this line. this will ignore all new lines until the next section
  Mechanical Engineering student at Cornell University with hands-on experience in robotics, wearable systems, and 
  mechanism design. Currently a member and incoming AstroTech Subteam Lead on Cornell Mars Rover engineering project team.
  Passionate about building things that work - from auger-based soil collection systems to pneumatic cardiac monitors. 

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/avatar.jpeg


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
resume-url: https://drive.google.com/file/d/13Z3duVzh-gguPU5r03oJVEE6rV9rd3DS/view?usp=sharing # or /assets/resume/resume.pdf


# Set up external links - this will show up as small icons next to your name.

external-links:    # input only your own url slug. The icons with missing entries will not appear.
  linkedin: oliviatolliver    # https://www.linkedin.com/in/{your url slug} 
  github:     # https://github.com/{your url slug} 
  stackoverflow:       # https://stackoverflow.com/users/{your url slug}
  medium:            # https://medium.com/@{your url slug} 
  x-twitter:   # https://x.com/{your url slug} 
  threads:            # https://threads.net/@{your url slug} 
  instragram:       # https://instagram.com/{your url slug} 
  youtube:           # https://youtube.com/@{your url slug} 
  discord:            # https://discord.com/users/{your url slug} 
  bluesky:           # https://bsky.app/profile/{your url slug} 
  

# Skills Section - Add the list of your Skills by categories/tools. The indentation for each level needs to be precise. 
skills:
  - category: 3D Modeling
    tools:
    - Fusion 360 (Autodesk)
    - Inventor (Autodesk)
    - Onshape
    - Solidworks
    - ANSYS
  - category: Prototyping
    tools:
    - Manual Lathe & Milling
    - 3D Printing (FDM, SLA)
    - Soldering
    - Technical Drawing
    - DFM/DFA
    - Assembly/Disassembly
  - category: Programming
    tools:
    - Python
    - MATLAB
    - Java
    - React Native
    - HTML/CSS
    - Git/GitHub
  - category: Design Practices
    tools:
    - Tolerance Analysis
    - BOM Development
    - Iterative Prototyping
    - Root Cause Analysis


# Contact Form Setup. Setup an account and copy over the key. When someone fills out the form, it will be received in your email.
formspree-key: xbdewzwq  # https://formspree.io/f/{8-digit key}


# Active theme (Updatethis to switch themes). Make sure to keep the indentation the same.
colors: # this is the basic theme
  text: "#1a1a1a"
  border: "#c5b2a3"
  link: "#2b2623"
  highlight: "#2b2623"
  background: "#ebd9cc"
  light_background: "#f3e8e0"

# FROM BETHANY JONES CANVA TEMPLATE
# background and text: #e7dfd8  (background)  |  #231f20  (text)
# good color scheme: #d1d3d4  |  #b0a092  |  #827263  |  #1f1b11  |  #574533 (all from photo)

#########################################################################################################
# Build settings for the site. Editing the below may cause the site to malfunction.

collections:
  projects:
    output: true
    permalink: /projects/:path/


markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed

include:
  - _projects


# Exclude from processing.
